# ============================================================
# Taralı Alan İhlal Tespit Sistemi — Ana Konfigürasyon
# ============================================================

# --- Genel ---
general:
  device: "auto"          # "auto", "cuda:0", "cpu"
  video_source: "data/videos/test/test_01.mp4"
  output_dir: "results"
  save_video: true
  show_display: false     # Colab'da false, yerelde true
  log_level: "INFO"

# --- Araç Tespiti ---
# best_v3.pt: yolov8m fine-tune (100 epoch, lr=1e-3, final_v3 dataset)
# Sınıflar:   {0:bus, 1:car, 2:motorcycle, 3:truck}
# Metrikler:  mAP50=0.808, mAP50-95=0.653, P=0.765, R=0.787
vehicle_detection:
  model_path: "weights/best_v4.pt"
  confidence_threshold: 0.55  # 0.35 → 0.55 (file2_dense noise filtrele)
  iou_threshold: 0.45
  classes: [0, 1, 2, 3]   # bus, car, motorcycle, truck (best_v3.pt sınıf sırası)
  img_size: 640
  half_precision: false    # CPU'da FP16 desteklenmez
  max_bbox_ratio: 0.25     # Frame'in %25'inden büyük bbox'lar suspect (yakın kamera)

# --- Araç Takibi ---
tracking:
  tracker_type: "bytetrack"
  config_path: "configs/bytetrack.yaml"

# --- Bölge (ROI) ---
zone:
  zone_file: "configs/zones/e5_avcilar.json"
  polygon_buffer: -10      # Negatif = içe doğru küçült (piksel)
  min_overlap_ratio: 0.3   # Araç bbox'ının bölge ile minimum örtüşme oranı

# --- İhlal Tespiti ---
violation:
  min_frames_in_zone: 15   # Minimum kare sayısı (5 → 15: kisa girdi-cikti filtre, 250 ms @ 60fps)
  cooldown_frames: 600     # Ayni araç icin tekrar ihlal suresi
  per_track_lock: true     # Ayni track_id daha once ihlal yaptiysa bir daha sayma
  # Yeni: ayni bolgede son N frame icinde ihlal varsa yeni track'i de sayma (track_id kaybi cozumu)
  spatial_dedup_enabled: true
  spatial_dedup_radius: 100   # piksel; ihlal noktasi etrafinda
  spatial_dedup_window_frames: 600  # son 10 sn @ 60fps
  states:
    - OUTSIDE
    - ENTERING
    - INSIDE
    - VIOLATION

# --- Görselleştirme ---
visualization:
  bbox_color_vehicle: [0, 255, 0]     # Yeşil (BGR)
  bbox_color_violation: [0, 0, 255]   # Kırmızı (BGR)
  zone_color: [255, 165, 0]           # Turuncu (BGR)
  zone_alpha: 0.3                     # Yarı şeffaf overlay
  font_scale: 0.6
  thickness: 2

# --- Plaka Tanıma ---
# Real-time'ı bozmamak için sadece VIOLATION onaylandığında çalışır.
# update_buffer her frame'de aktif track'lerin vehicle crop'unu kuyruğa
# ekler; recognize() buffer üzerinde best-frame voting yapar.
plate:
  enabled: true
  detector:
    model_path: "weights/plate.pt"     # YOLOv8n fine-tuned (notebook 06)
    confidence_threshold: 0.25
    iou_threshold: 0.45
    img_size: 640
    half: false                         # CPU/MPS'te FP16 desteklenmez
  ocr:
    backend: "easyocr"                  # "easyocr" | "paddleocr" (gelecek)
    languages: ["en"]                   # Latin karakter setine yeter
    use_gpu: false                      # Mac'te kapalı; CUDA'lı makinede true
  recognizer:
    buffer_size: 10                     # Track başına son N frame
    min_plate_conf: 0.25                # Plaka detect skoru altında atla
    topk_for_ocr: 3                     # En iyi K crop'a OCR uygula
    valid_format_bonus: 1.5             # TR formatına uyan sonuca verilen bonus

# --- Veritabanı ---
database:
  path: "results/violations.db"
