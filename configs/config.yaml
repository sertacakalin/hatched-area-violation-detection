# ============================================================
# Taralı Alan İhlal Tespit Sistemi — Ana Konfigürasyon
# ============================================================

# --- Genel ---
general:
  device: "auto"          # "auto", "cuda:0", "cpu"
  video_source: "data/videos/test/test_01.mp4"
  output_dir: "results"
  save_video: true
  show_display: false     # Colab'da false, yerelde true
  log_level: "INFO"

# --- Araç Tespiti ---
vehicle_detection:
  model_path: "yolov8s.pt"
  confidence_threshold: 0.35
  iou_threshold: 0.45
  classes: [2, 3, 5, 7]   # car, motorcycle, bus, truck (COCO IDs)
  img_size: 640
  half_precision: false    # CPU'da FP16 desteklenmez

# --- Araç Takibi ---
tracking:
  tracker_type: "bytetrack"
  config_path: "configs/bytetrack.yaml"

# --- Bölge (ROI) ---
zone:
  zone_file: "configs/zones/e5_avcilar.json"
  polygon_buffer: -10      # Negatif = içe doğru küçült (piksel)
  min_overlap_ratio: 0.3   # Araç bbox'ının bölge ile minimum örtüşme oranı

# --- İhlal Tespiti ---
violation:
  min_frames_in_zone: 5    # Minimum kare sayısı (temporal filtre)
  cooldown_frames: 90      # Aynı araç için tekrar ihlal süresi (3 sn @ 30fps)
  states:
    - OUTSIDE
    - ENTERING
    - INSIDE
    - VIOLATION

# --- Görselleştirme ---
visualization:
  bbox_color_vehicle: [0, 255, 0]     # Yeşil (BGR)
  bbox_color_violation: [0, 0, 255]   # Kırmızı (BGR)
  zone_color: [255, 165, 0]           # Turuncu (BGR)
  zone_alpha: 0.3                     # Yarı şeffaf overlay
  font_scale: 0.6
  thickness: 2

# --- Veritabanı ---
database:
  path: "results/violations.db"
