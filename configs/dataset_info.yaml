# ------------------------------------------------------------
# Fine-tuning runs — values extracted from .pt train_args/train_metrics
# ------------------------------------------------------------
training:
  # === v1 (legacy) ===
  v1:
    base_model:    yolov8s.pt                     # COCO-pretrained
    data_yaml:     "/content/istanbul-traffic-vehicles-2/data.yaml"
    epochs_max:    50
    batch_size:    16
    image_size:    640
    optimizer:     auto                           # SGD + cosine annealing
    lr0:           0.01
    lrf:           0.01
    momentum:      0.937
    weight_decay:  0.0005
    patience:      10
    device:        T4
    run_date:      "2026-04-05"
    drive_run_dir: "/content/drive/MyDrive/tez_models/istanbul_finetune4"
    final_metrics:
      precision:   0.6389
      recall:      0.5656
      mAP50:       0.5969
      mAP50_95:    0.4496
      box_loss:    0.72702
      cls_loss:    0.56471
      dfl_loss:    0.87248
      epochs_actual: 26     # early stop (patience 10)
      best_epoch:    16
      training_hours: 1.47

  # === v3 (PRODUCTION) ===
  v3:
    base_model:    yolov8m.pt                     # COCO-pretrained, medium (larger than v1)
    data_yaml:     "/content/final_v3/data.yaml"
    epochs_max:    100
    batch_size:    16
    image_size:    640
    optimizer:     auto
    lr0:           0.001                          # 10x lower than v1 (proper fine-tune)
    momentum:      0.937
    weight_decay:  0.0005
    device:        T4
    run_date:      TODO_FILL_FROM_DRIVE_RUN
    drive_run_dir: TODO_FILL_FROM_DRIVE_RUN       # final_v3/ Drive folder
    final_metrics:
      precision:   0.7647
      recall:      0.7873
      mAP50:       0.8075
      mAP50_95:    0.6530
      epochs_actual: TODO                         # last row of results.csv
      best_epoch:    TODO
      training_hours: TODO

  # === Plate ===
  plate:
    base_model:    yolov8n.pt
    data_yaml:     "/content/TR-PLAKA-1/data.yaml"
    epochs_max:    80
    batch_size:    32
    image_size:    640
    optimizer:     auto
    lr0:           0.001
    momentum:      0.937
    weight_decay:  0.0005
    device:        T4
    run_date:      TODO
    drive_run_dir: TODO
    final_metrics:
      precision:   0.9560
      recall:      0.9447
      mAP50:       0.9815
      mAP50_95:    0.8171
      epochs_actual: TODO
      best_epoch:    TODO
      training_hours: TODO

