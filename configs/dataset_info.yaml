# ============================================================
# Dataset & Fine-Tuning Provenance
# ============================================================
# This file is the single source of truth for WHERE the data came from
# and HOW the fine-tuned models were produced. Thesis Section 4
# (Dataset) and Section 7 (Experiments) pull their numbers from here.
#
# Git tracks this file. The actual images/weights live in Roboflow and
# Google Drive — see data/README.md and weights/README.md for pull
# instructions.
#
# Three datasets are documented here:
#   1. dataset_v1   → produced weights/best.pt    (legacy yolov8s)
#   2. dataset_v3   → produced weights/best_v3.pt (PRODUCTION yolov8m)
#   3. dataset_plate → produced weights/plate.pt  (TR plate detector)
# ============================================================

